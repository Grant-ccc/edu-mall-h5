openapi: 3.0.3
info:
  title: Edu Mall Admin API
  version: 1.0.0
  description: |
    管理后台接口文档。所有接口路径均以 /api/mall 为全局前缀。
    除鉴权失败可能返回 HTTP 401 外，业务接口统一返回 Resp 包装结构。
servers:
  - url: /api/mall
security:
  - TokenAuth: []
tags:
  - name: AdminAuth
    description: 管理员登录、验证码、飞书扫码
  - name: AdminCustomer
    description: C 端用户管理
  - name: AdminUser
    description: 管理员用户管理
  - name: AdminPerm
    description: 权限菜单管理
  - name: AdminRole
    description: 角色管理
  - name: AdminStorage
    description: 对象存储临时密钥
  - name: AdminLesson
    description: 录播课时与分类管理
  - name: AdminCourse
    description: 课程与目录管理
  - name: AdminOrder
    description: 订单、退款与统计
paths:
  /admin/v1/user/verify/captcha:
    get:
      tags: [AdminAuth]
      summary: 获取滑块验证码
      security: []
      parameters:
        - $ref: '#/components/parameters/once'
        - $ref: '#/components/parameters/ts'
        - $ref: '#/components/parameters/sign'
      responses:
        '200': { $ref: '#/components/responses/GetVerifyCaptchaResp' }
  /admin/v1/user/verify/captcha/check:
    post:
      tags: [AdminAuth]
      summary: 校验滑块验证码
      security: []
      requestBody: { $ref: '#/components/requestBodies/CheckCaptchaReq' }
      responses:
        '200': { $ref: '#/components/responses/CheckCaptchaResp' }
  /admin/v1/user/verify/smscode:
    post:
      tags: [AdminAuth]
      summary: 发送短信验证码
      security: []
      requestBody: { $ref: '#/components/requestBodies/GetSmsVerifyCodeReq' }
      responses:
        '200': { $ref: '#/components/responses/EmptyResp' }
  /admin/v1/user/mobile/password_login:
    post:
      tags: [AdminAuth]
      summary: 管理员手机号密码登录
      security: []
      requestBody: { $ref: '#/components/requestBodies/MobilePasswordLoginReq' }
      responses:
        '200': { $ref: '#/components/responses/AdminLoginResp' }
  /admin/v1/user/mobile/verify_login:
    post:
      tags: [AdminAuth]
      summary: 管理员手机号验证码登录
      security: []
      requestBody: { $ref: '#/components/requestBodies/MobileVerifyCodeLoginReq' }
      responses:
        '200': { $ref: '#/components/responses/AdminLoginResp' }
  /admin/v1/user/lark/qrcode_login:
    post:
      tags: [AdminAuth]
      summary: 飞书扫码登录
      security: []
      requestBody: { $ref: '#/components/requestBodies/LarkQrCodeLoginReq' }
      responses:
        '200': { $ref: '#/components/responses/AdminLoginResp' }
  /admin/v1/user/mobile/reset_password:
    post:
      tags: [AdminAuth]
      summary: 手机号重置密码
      security: []
      requestBody: { $ref: '#/components/requestBodies/MobilePasswordResetReq' }
      responses:
        '200': { $ref: '#/components/responses/EmptyResp' }
  /admin/v1/customer/user/list:
    get:
      tags: [AdminCustomer]
      summary: C 端用户列表
      parameters:
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/limit'
        - $ref: '#/components/parameters/unlimited'
        - { name: id, in: query, schema: { type: integer, format: int64 }, description: 用户 ID }
        - { name: nick_name_kw, in: query, schema: { type: string }, description: 昵称关键词 }
        - { name: status, in: query, schema: { type: integer, format: int32 }, description: 用户状态 }
        - { name: mobile, in: query, schema: { type: string }, description: 手机号 }
      responses:
        '200': { $ref: '#/components/responses/ListCustomerUserResp' }
  /admin/v1/customer/user/info:
    get:
      tags: [AdminCustomer]
      summary: C 端用户详情
      parameters:
        - { name: id, in: query, required: true, schema: { type: integer, format: int64 }, description: 用户 ID }
      responses:
        '200': { $ref: '#/components/responses/CustomerUserInfoResp' }
  /admin/v1/user/logout:
    post:
      tags: [AdminUser]
      summary: 管理员登出
      responses:
        '200': { $ref: '#/components/responses/EmptyResp' }
  /admin/v1/user/list:
    get:
      tags: [AdminUser]
      summary: 管理员用户列表
      parameters:
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/limit'
        - $ref: '#/components/parameters/unlimited'
        - { name: name_kw, in: query, schema: { type: string }, description: 用户名关键词 }
        - { name: mobile, in: query, schema: { type: string }, description: 手机号 }
        - { name: role_id, in: query, schema: { type: integer, format: int64 }, description: 角色 ID }
        - { name: status, in: query, schema: { type: integer, format: int32 }, description: 状态 }
      responses:
        '200': { $ref: '#/components/responses/ListAdminUserResp' }
  /admin/v1/user/info:
    get:
      tags: [AdminUser]
      summary: 当前管理员信息
      responses:
        '200': { $ref: '#/components/responses/AdminUserWithRoleResp' }
  /admin/v1/user/create:
    post:
      tags: [AdminUser]
      summary: 创建管理员用户
      requestBody: { $ref: '#/components/requestBodies/CreateUserReq' }
      responses:
        '200': { $ref: '#/components/responses/IdResp' }
  /admin/v1/user/update:
    post:
      tags: [AdminUser]
      summary: 更新管理员用户
      requestBody: { $ref: '#/components/requestBodies/UpdateUserReq' }
      responses:
        '200': { $ref: '#/components/responses/EmptyResp' }
  /admin/v1/user/delete:
    post:
      tags: [AdminUser]
      summary: 删除管理员用户
      requestBody: { $ref: '#/components/requestBodies/DeleteUserReq' }
      responses:
        '200': { $ref: '#/components/responses/EmptyResp' }
  /admin/v1/user/lark_bind:
    post:
      tags: [AdminUser]
      summary: 绑定飞书账号
      requestBody: { $ref: '#/components/requestBodies/LarkQrCodeBindReq' }
      responses:
        '200': { $ref: '#/components/responses/EmptyResp' }
  /admin/v1/user/lark_unbind:
    post:
      tags: [AdminUser]
      summary: 解绑飞书账号
      responses:
        '200': { $ref: '#/components/responses/EmptyResp' }
  /admin/v1/perm/create:
    post:
      tags: [AdminPerm]
      summary: 创建权限/菜单
      requestBody: { $ref: '#/components/requestBodies/AddPermissionReq' }
      responses:
        '200': { $ref: '#/components/responses/IdResp' }
  /admin/v1/perm/update:
    post:
      tags: [AdminPerm]
      summary: 批量更新权限/菜单
      requestBody: { $ref: '#/components/requestBodies/UpdatePermissionReq' }
      responses:
        '200': { $ref: '#/components/responses/EmptyResp' }
  /admin/v1/perm/delete:
    post:
      tags: [AdminPerm]
      summary: 删除权限/菜单
      requestBody: { $ref: '#/components/requestBodies/DeletePermissionReq' }
      responses:
        '200': { $ref: '#/components/responses/EmptyResp' }
  /admin/v1/perm/list:
    get:
      tags: [AdminPerm]
      summary: 权限菜单列表
      responses:
        '200': { $ref: '#/components/responses/PermissionListResp' }
  /admin/v1/perm/my_perms:
    get:
      tags: [AdminPerm]
      summary: 当前管理员权限列表
      responses:
        '200': { $ref: '#/components/responses/MyPermissionListResp' }
  /admin/v1/role/create:
    post:
      tags: [AdminRole]
      summary: 创建角色
      requestBody: { $ref: '#/components/requestBodies/AddRoleReq' }
      responses:
        '200': { $ref: '#/components/responses/IdResp' }
  /admin/v1/role/update:
    post:
      tags: [AdminRole]
      summary: 更新角色
      requestBody: { $ref: '#/components/requestBodies/UpdateRoleReq' }
      responses:
        '200': { $ref: '#/components/responses/EmptyResp' }
  /admin/v1/role/list:
    get:
      tags: [AdminRole]
      summary: 角色列表
      parameters:
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/limit'
        - $ref: '#/components/parameters/unlimited'
        - { name: name_kw, in: query, schema: { type: string }, description: 角色名称关键词 }
        - { name: status, in: query, schema: { type: integer, format: int32 }, description: 角色状态 }
      responses:
        '200': { $ref: '#/components/responses/ListRoleResp' }
  /admin/v1/role/my_roles:
    get:
      tags: [AdminRole]
      summary: 当前管理员角色列表
      responses:
        '200': { $ref: '#/components/responses/MyRolesResp' }
  /admin/v1/role/perm/sets:
    post:
      tags: [AdminRole]
      summary: 设置角色权限
      requestBody: { $ref: '#/components/requestBodies/SetRolePermReq' }
      responses:
        '200': { $ref: '#/components/responses/EmptyResp' }
  /admin/v1/storage/get_temp_secret:
    post:
      tags: [AdminStorage]
      summary: 获取对象存储临时密钥
      requestBody: { $ref: '#/components/requestBodies/GetTempSecretReq' }
      responses:
        '200': { $ref: '#/components/responses/TempSecretResp' }
  /admin/v1/lesson/category/create:
    post:
      tags: [AdminLesson]
      summary: 创建课时分类
      requestBody: { $ref: '#/components/requestBodies/AddCategoryReq' }
      responses:
        '200': { $ref: '#/components/responses/Int64Resp' }
  /admin/v1/lesson/category/update:
    post:
      tags: [AdminLesson]
      summary: 更新课时分类
      requestBody: { $ref: '#/components/requestBodies/UpdateCategoryReq' }
      responses:
        '200': { $ref: '#/components/responses/EmptyResp' }
  /admin/v1/lesson/category/delete:
    post:
      tags: [AdminLesson]
      summary: 删除课时分类
      requestBody: { $ref: '#/components/requestBodies/DeleteCategoryReq' }
      responses:
        '200': { $ref: '#/components/responses/EmptyResp' }
  /admin/v1/lesson/category/list:
    get:
      tags: [AdminLesson]
      summary: 课时分类列表
      parameters:
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/limit'
        - $ref: '#/components/parameters/unlimited'
      responses:
        '200': { $ref: '#/components/responses/CategoryListResp' }
  /admin/v1/lesson/category/update_sort:
    post:
      tags: [AdminLesson]
      summary: 更新课时分类排序
      requestBody: { $ref: '#/components/requestBodies/UpdateSortListReq' }
      responses:
        '200': { $ref: '#/components/responses/EmptyResp' }
  /admin/v1/lesson/create:
    post:
      tags: [AdminLesson]
      summary: 创建课时
      requestBody: { $ref: '#/components/requestBodies/CreateLessonReq' }
      responses:
        '200': { $ref: '#/components/responses/IdResp' }
  /admin/v1/lesson/update:
    post:
      tags: [AdminLesson]
      summary: 更新课时
      requestBody: { $ref: '#/components/requestBodies/UpdateLessonReq' }
      responses:
        '200': { $ref: '#/components/responses/EmptyResp' }
  /admin/v1/lesson/move:
    post:
      tags: [AdminLesson]
      summary: 移动课时到分类
      requestBody: { $ref: '#/components/requestBodies/MoveLessonReq' }
      responses:
        '200': { $ref: '#/components/responses/EmptyResp' }
  /admin/v1/lesson/update_status:
    post:
      tags: [AdminLesson]
      summary: 更新课时状态
      requestBody: { $ref: '#/components/requestBodies/UpdateLessonStatusReq' }
      responses:
        '200': { $ref: '#/components/responses/EmptyResp' }
  /admin/v1/lesson/list:
    post:
      tags: [AdminLesson]
      summary: 课时列表
      requestBody: { $ref: '#/components/requestBodies/ListLessonReq' }
      responses:
        '200': { $ref: '#/components/responses/ListLessonResp' }
  /admin/v1/lesson/info:
    get:
      tags: [AdminLesson]
      summary: 课时详情
      parameters:
        - { name: lesson_id, in: query, required: true, schema: { type: integer, format: int64 }, description: 课时 ID }
        - { name: user_id, in: query, schema: { type: integer, format: int64 }, description: 用户 ID }
      responses:
        '200': { $ref: '#/components/responses/LessonResp' }
  /admin/v1/course/create:
    post:
      tags: [AdminCourse]
      summary: 创建课程
      requestBody: { $ref: '#/components/requestBodies/CreateCourseReq' }
      responses:
        '200': { $ref: '#/components/responses/IdResp' }
  /admin/v1/course/info:
    get:
      tags: [AdminCourse]
      summary: 课程详情
      parameters:
        - { name: id, in: query, required: true, schema: { type: integer, format: int64 }, description: 课程 ID }
      responses:
        '200': { $ref: '#/components/responses/CourseResp' }
  /admin/v1/course/update:
    post:
      tags: [AdminCourse]
      summary: 更新课程
      requestBody: { $ref: '#/components/requestBodies/UpdateCourseReq' }
      responses:
        '200': { $ref: '#/components/responses/EmptyResp' }
  /admin/v1/course/update_status:
    post:
      tags: [AdminCourse]
      summary: 更新课程状态
      requestBody: { $ref: '#/components/requestBodies/UpdateCourseStatusReq' }
      responses:
        '200': { $ref: '#/components/responses/EmptyResp' }
  /admin/v1/course/list:
    get:
      tags: [AdminCourse]
      summary: 课程列表
      parameters:
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/limit'
        - $ref: '#/components/parameters/unlimited'
        - { name: user_id, in: query, schema: { type: integer, format: int64 }, description: 用户 ID，用于查询购买状态 }
        - { name: id, in: query, schema: { type: integer, format: int64 }, description: 课程 ID }
        - { name: name_kw, in: query, schema: { type: string }, description: 课程名称关键词 }
        - { name: create_start_time, in: query, schema: { type: integer, format: int64 }, description: 创建开始时间 }
        - { name: create_end_time, in: query, schema: { type: integer, format: int64 }, description: 创建结束时间 }
        - { name: update_start_time, in: query, schema: { type: integer, format: int64 }, description: 更新开始时间 }
        - { name: update_end_time, in: query, schema: { type: integer, format: int64 }, description: 更新结束时间 }
        - { name: update_status, in: query, schema: { type: integer, format: int32 }, description: 更新状态 }
        - { name: status, in: query, schema: { type: integer, format: int32 }, description: 课程状态 }
        - { name: is_recommend, in: query, schema: { type: boolean }, description: 是否推荐 }
      responses:
        '200': { $ref: '#/components/responses/CourseListResp' }
  /admin/v1/course/catalog/add:
    post:
      tags: [AdminCourse]
      summary: 添加课程目录
      requestBody: { $ref: '#/components/requestBodies/AddCatalogReq' }
      responses:
        '200': { $ref: '#/components/responses/IdResp' }
  /admin/v1/course/catalog/update:
    post:
      tags: [AdminCourse]
      summary: 更新课程目录
      requestBody: { $ref: '#/components/requestBodies/UpdateCatalogReq' }
      responses:
        '200': { $ref: '#/components/responses/EmptyResp' }
  /admin/v1/course/catalog/delete:
    post:
      tags: [AdminCourse]
      summary: 删除课程目录
      requestBody: { $ref: '#/components/requestBodies/DeleteCatalogReq' }
      responses:
        '200': { $ref: '#/components/responses/EmptyResp' }
  /admin/v1/course/catalog/update_sort:
    post:
      tags: [AdminCourse]
      summary: 更新课程目录排序
      requestBody: { $ref: '#/components/requestBodies/UpdateCatalogSortReq' }
      responses:
        '200': { $ref: '#/components/responses/EmptyResp' }
  /admin/v1/course/catalog/info:
    get:
      tags: [AdminCourse]
      summary: 课程目录详情
      parameters:
        - { name: course_id, in: query, required: true, schema: { type: integer, format: int64 }, description: 课程 ID }
      responses:
        '200': { $ref: '#/components/responses/CatalogInfoResp' }
  /admin/v1/course/catalog/add_lesson:
    post:
      tags: [AdminCourse]
      summary: 添加课时到课程目录
      requestBody: { $ref: '#/components/requestBodies/AddCatalogLessonReq' }
      responses:
        '200': { $ref: '#/components/responses/EmptyResp' }
  /admin/v1/course/catalog/remove_lesson:
    post:
      tags: [AdminCourse]
      summary: 从课程目录移除课时
      requestBody: { $ref: '#/components/requestBodies/RemoveCatalogLessonReq' }
      responses:
        '200': { $ref: '#/components/responses/EmptyResp' }
  /admin/v1/course/catalog/update_lesson:
    post:
      tags: [AdminCourse]
      summary: 更新课程目录课时
      requestBody: { $ref: '#/components/requestBodies/UpdateCatalogLessonReq' }
      responses:
        '200': { $ref: '#/components/responses/EmptyResp' }
  /admin/v1/order/list:
    post:
      tags: [AdminOrder]
      summary: 订单列表
      description: router.go 中订单路由写为 adminRoot.POST("v1/order/list", ...)，缺少前导 /；此处按业务期望整理为 /admin/v1/order/list，运行态需确认。
      requestBody: { $ref: '#/components/requestBodies/GetOrderListReq' }
      responses:
        '200': { $ref: '#/components/responses/GetOrderListResp' }
  /admin/v1/order/info:
    get:
      tags: [AdminOrder]
      summary: 订单详情
      description: router.go 中订单路由缺少前导 /；此处按业务期望整理，运行态需确认。
      parameters:
        - { name: order_id, in: query, required: true, schema: { type: integer, format: int64 }, description: 订单 ID }
      responses:
        '200': { $ref: '#/components/responses/OrderInfoResp' }
  /admin/v1/order/statistic:
    get:
      tags: [AdminOrder]
      summary: 订单统计
      description: router.go 中订单路由缺少前导 /；此处按业务期望整理，运行态需确认。
      parameters:
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/limit'
        - $ref: '#/components/parameters/unlimited'
        - { name: date_type, in: query, schema: { type: integer, format: int32 }, description: 日期类型：1 按天，2 按月，3 按季度，4 按年 }
        - { name: goods_id, in: query, schema: { type: integer, format: int64 }, description: 商品 ID }
        - { name: start_time, in: query, schema: { type: integer, format: int64 }, description: 开始时间 }
        - { name: end_time, in: query, schema: { type: integer, format: int64 }, description: 结束时间 }
      responses:
        '200': { $ref: '#/components/responses/OrderStatResp' }
  /admin/v1/order/refund:
    post:
      tags: [AdminOrder]
      summary: 订单退款
      description: router.go 中订单路由缺少前导 /；此处按业务期望整理，运行态需确认。
      requestBody: { $ref: '#/components/requestBodies/OrderRefundReq' }
      responses:
        '200': { $ref: '#/components/responses/EmptyResp' }
  /admin/v1/order/cancel:
    post:
      tags: [AdminOrder]
      summary: 后台取消订单
      description: router.go 中订单路由缺少前导 /；此处按业务期望整理，运行态需确认。
      requestBody: { $ref: '#/components/requestBodies/CancelOrderReq' }
      responses:
        '200': { $ref: '#/components/responses/EmptyResp' }
components:
  securitySchemes:
    TokenAuth:
      type: apiKey
      in: header
      name: token
      description: 管理后台登录 token。白名单接口无需传入。
  parameters:
    page: { name: page, in: query, schema: { type: integer, default: 1 }, description: 页码 }
    limit: { name: limit, in: query, schema: { type: integer, default: 10, maximum: 1000 }, description: 每页条数 }
    unlimited: { name: unlimited, in: query, schema: { type: boolean, default: false }, description: 是否不限制分页上限 }
    once: { name: once, in: query, schema: { type: string }, description: 一次性随机串 }
    ts: { name: ts, in: query, schema: { type: integer, format: int64 }, description: 时间戳 }
    sign: { name: sign, in: query, schema: { type: string }, description: 签名，sha256(once + 固定秘钥 + ts) 小写 }
  requestBodies:
    CheckCaptchaReq: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/CheckCaptchaReq' } } } }
    GetSmsVerifyCodeReq: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/GetSmsVerifyCodeReq' } } } }
    MobilePasswordLoginReq: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/MobilePasswordLoginReq' } } } }
    MobileVerifyCodeLoginReq: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/MobileVerifyCodeLoginReq' } } } }
    MobilePasswordResetReq: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/MobilePasswordResetReq' } } } }
    LarkQrCodeLoginReq: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/LarkQrCodeReq' } } } }
    LarkQrCodeBindReq: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/LarkQrCodeReq' } } } }
    CreateUserReq: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/CreateUserReq' } } } }
    UpdateUserReq: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/UpdateUserReq' } } } }
    DeleteUserReq: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/DeleteUserReq' } } } }
    AddPermissionReq: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/AddPermissionReq' } } } }
    UpdatePermissionReq: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/UpdatePermissionReq' } } } }
    DeletePermissionReq: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/DeletePermissionReq' } } } }
    AddRoleReq: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/AddRoleReq' } } } }
    UpdateRoleReq: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/UpdateRoleReq' } } } }
