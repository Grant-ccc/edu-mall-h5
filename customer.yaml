openapi: 3.0.3
info:
  title: Edu Mall Customer API
  version: 1.0.0
  description: |
    C 端接口文档。所有业务接口路径均以 /api/mall 为全局前缀。
    除微信支付/退款回调外，接口统一返回 Resp 包装结构。
servers:
  - url: /api/mall
security:
  - TokenAuth: []
tags:
  - name: CustomerAuth
    description: C 端登录、验证码、微信扫码
  - name: CustomerUser
    description: C 端用户中心
  - name: CustomerCourse
    description: C 端课程、课时、学习进度
  - name: CustomerCart
    description: C 端购物车
  - name: CustomerOrder
    description: C 端订单与支付
  - name: WechatCallback
    description: 微信支付/退款回调
paths:
  /customer/v1/user/verify/captcha:
    get:
      tags: [CustomerAuth]
      summary: 获取滑块验证码
      security: []
      parameters:
        - $ref: '#/components/parameters/once'
        - $ref: '#/components/parameters/ts'
        - $ref: '#/components/parameters/sign'
      responses:
        '200': { $ref: '#/components/responses/GetVerifyCaptchaResp' }
  /customer/v1/user/verify/captcha/check:
    post:
      tags: [CustomerAuth]
      summary: 校验滑块验证码
      security: []
      requestBody: { $ref: '#/components/requestBodies/CheckCaptchaReq' }
      responses:
        '200': { $ref: '#/components/responses/CheckCaptchaResp' }
  /customer/v1/user/verify/smscode:
    post:
      tags: [CustomerAuth]
      summary: 发送短信验证码
      security: []
      requestBody: { $ref: '#/components/requestBodies/GetSmsVerifyCodeReq' }
      responses:
        '200': { $ref: '#/components/responses/SmsVerifyCodeResp' }
  /customer/v1/user/applet/login:
    post:
      tags: [CustomerAuth]
      summary: 小程序登录
      security: []
      requestBody: { $ref: '#/components/requestBodies/AppletLoginReq' }
      responses:
        '200': { $ref: '#/components/responses/LoginResp' }
  /customer/v1/user/mobile/password_login:
    post:
      tags: [CustomerAuth]
      summary: 手机号密码登录
      security: []
      requestBody: { $ref: '#/components/requestBodies/MobilePasswordLoginReq' }
      responses:
        '200': { $ref: '#/components/responses/LoginResp' }
  /customer/v1/user/mobile/verify_login:
    post:
      tags: [CustomerAuth]
      summary: 手机号验证码登录/注册
      security: []
      requestBody: { $ref: '#/components/requestBodies/MobileVerifyCodeLoginReq' }
      responses:
        '200': { $ref: '#/components/responses/LoginResp' }
  /customer/v1/user/mobile/reset_password:
    post:
      tags: [CustomerAuth]
      summary: 手机号重置密码
      security: []
      requestBody: { $ref: '#/components/requestBodies/MobilePasswordResetReq' }
      responses:
        '200': { $ref: '#/components/responses/EmptyResp' }
  /customer/v1/user/wechat/qrcode_login:
    post:
      tags: [CustomerAuth]
      summary: 获取微信扫码登录二维码
      security: []
      requestBody: { $ref: '#/components/requestBodies/WechatQrCodeReq' }
      responses:
        '200': { $ref: '#/components/responses/WechatQrCodeResp' }
  /customer/v1/user/wechat/qrcode_status:
    get:
      tags: [CustomerAuth]
      summary: 查询微信扫码状态
      security: []
      parameters:
        - name: scene_token
          in: query
          schema: { type: string }
          description: 扫码场景令牌
      responses:
        '200': { $ref: '#/components/responses/WechatQrCodeStatusResp' }
  /customer/v1/user/wechat/scan_confirm:
    post:
      tags: [CustomerAuth]
      summary: 微信扫码确认
      security: []
      requestBody: { $ref: '#/components/requestBodies/WechatScanConfirmReq' }
      responses:
        '200': { $ref: '#/components/responses/WechatQrCodeStatusResp' }
  /customer/v1/wechat/callback/payment:
    post:
      tags: [WechatCallback]
      summary: 微信支付结果回调
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object, description: 微信支付 V3 回调原始报文 }
      responses:
        '200': { description: 微信回调处理成功, content: { application/json: { schema: { $ref: '#/components/schemas/WechatNotifyRsp' } } } }
        '400': { description: 微信回调解析失败 }
        '500': { description: 微信回调处理失败 }
  /customer/v1/wechat/callback/refund:
    post:
      tags: [WechatCallback]
      summary: 微信退款结果回调
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object, description: 微信退款 V3 回调原始报文 }
      responses:
        '200': { description: 微信回调处理成功, content: { application/json: { schema: { $ref: '#/components/schemas/WechatNotifyRsp' } } } }
        '400': { description: 微信回调解析失败 }
        '500': { description: 微信回调处理失败 }
  /customer/v1/user/info:
    get:
      tags: [CustomerUser]
      summary: 获取当前用户信息
      responses:
        '200': { $ref: '#/components/responses/UserInfoResp' }
  /customer/v1/user/change_password:
    post:
      tags: [CustomerUser]
      summary: 修改密码
      requestBody: { $ref: '#/components/requestBodies/ChangePasswordReq' }
      responses:
        '200': { $ref: '#/components/responses/ChangePasswordResp' }
  /customer/v1/user/change_password/smscode:
    post:
      tags: [CustomerUser]
      summary: 发送修改密码短信验证码
      requestBody: { $ref: '#/components/requestBodies/ChangePasswordSmsCodeReq' }
      responses:
        '200': { $ref: '#/components/responses/SmsVerifyCodeResp' }
  /customer/v1/user/wechat/qrcode_bind:
    post:
      tags: [CustomerUser]
      summary: 获取微信绑定二维码
      requestBody: { $ref: '#/components/requestBodies/WechatQrCodeReq' }
      responses:
        '200': { $ref: '#/components/responses/WechatQrCodeResp' }
  /customer/v1/user/wechat/unbind:
    post:
      tags: [CustomerUser]
      summary: 解绑微信
      responses:
        '200': { $ref: '#/components/responses/EmptyResp' }
  /customer/v1/course/list:
    get:
      tags: [CustomerCourse]
      summary: 课程列表
      parameters:
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/limit'
        - $ref: '#/components/parameters/unlimited'
        - { name: id, in: query, schema: { type: integer, format: int64 }, description: 课程 ID }
        - { name: name_kw, in: query, schema: { type: string }, description: 课程名称关键词 }
        - { name: create_start_time, in: query, schema: { type: integer, format: int64 }, description: 创建开始时间，毫秒时间戳 }
        - { name: create_end_time, in: query, schema: { type: integer, format: int64 }, description: 创建结束时间，毫秒时间戳 }
        - { name: update_start_time, in: query, schema: { type: integer, format: int64 }, description: 更新开始时间，毫秒时间戳 }
        - { name: update_end_time, in: query, schema: { type: integer, format: int64 }, description: 更新结束时间，毫秒时间戳 }
        - { name: update_status, in: query, schema: { type: integer, format: int32 }, description: 更新状态 }
        - { name: status, in: query, schema: { type: integer, format: int32 }, description: 课程状态，C 端服务会固定查询启用状态 }
        - { name: is_recommend, in: query, schema: { type: boolean }, description: 是否推荐 }
      responses:
        '200': { $ref: '#/components/responses/CourseListResp' }
  /customer/v1/course/detail:
    get:
      tags: [CustomerCourse]
      summary: 课程详情
      parameters:
        - { name: id, in: query, required: true, schema: { type: integer, format: int64 }, description: 课程 ID }
      responses:
        '200': { $ref: '#/components/responses/CourseDetailResp' }
  /customer/v1/course/lesson/info:
    get:
      tags: [CustomerCourse]
      summary: 课时信息
      parameters:
        - { name: lesson_id, in: query, required: true, schema: { type: integer, format: int64 }, description: 课时 ID }
        - { name: user_id, in: query, schema: { type: integer, format: int64 }, description: 用户 ID，通常由登录态约束 }
      responses:
        '200': { $ref: '#/components/responses/LessonResp' }
  /customer/v1/course/lesson/learn_info:
    get:
      tags: [CustomerCourse]
      summary: 课时学习进度
      parameters:
        - { name: course_id, in: query, required: true, schema: { type: integer, format: int64 }, description: 课程 ID }
        - { name: lesson_id, in: query, required: true, schema: { type: integer, format: int64 }, description: 课时 ID }
      responses:
        '200': { $ref: '#/components/responses/LessonLearnInfoResp' }
  /customer/v1/course/lesson/learn_report:
    post:
      tags: [CustomerCourse]
      summary: 上报课时学习进度
      requestBody: { $ref: '#/components/requestBodies/LessonLearnReportReq' }
      responses:
        '200': { $ref: '#/components/responses/EmptyResp' }
  /customer/v1/course/purchased/list:
    get:
      tags: [CustomerCourse]
      summary: 已购买课程列表
      parameters:
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/limit'
        - $ref: '#/components/parameters/unlimited'
      responses:
        '200': { $ref: '#/components/responses/PurchasedCourseListResp' }
  /customer/v1/course/continue/list:
    get:
      tags: [CustomerCourse]
      summary: 继续学习课程列表
      parameters:
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/limit'
        - $ref: '#/components/parameters/unlimited'
      responses:
        '200': { $ref: '#/components/responses/ContinueLearnResp' }
  /customer/v1/cart/add_goods:
    post:
      tags: [CustomerCart]
      summary: 添加商品到购物车
      requestBody: { $ref: '#/components/requestBodies/AddGoodsReq' }
      responses:
        '200': { $ref: '#/components/responses/IdResp' }
  /customer/v1/cart/remove_goods:
    post:
      tags: [CustomerCart]
      summary: 删除购物车商品
      requestBody: { $ref: '#/components/requestBodies/RemoveGoodsReq' }
      responses:
        '200': { $ref: '#/components/responses/EmptyResp' }
  /customer/v1/cart/list_goods:
    get:
      tags: [CustomerCart]
      summary: 购物车商品列表
      parameters:
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/limit'
        - $ref: '#/components/parameters/unlimited'
        - { name: goods_name_kw, in: query, schema: { type: string }, description: 商品名称关键词；代码 DTO 缺少 form tag，绑定行为需以运行态为准 }
      responses:
        '200': { $ref: '#/components/responses/ListGoodsResp' }
  /customer/v1/order/calc_fee:
    post:
      tags: [CustomerOrder]
      summary: 计算订单价格
      requestBody: { $ref: '#/components/requestBodies/OrderCalcFeeReq' }
      responses:
        '200': { $ref: '#/components/responses/OrderCalcFeeResp' }
  /customer/v1/order/pay_now:
    post:
      tags: [CustomerOrder]
      summary: 立即创建订单并发起支付
      requestBody: { $ref: '#/components/requestBodies/OrderPayNowReq' }
      responses:
        '200': { $ref: '#/components/responses/OrderPayNowResp' }
  /customer/v1/order/pay_later:
    post:
      tags: [CustomerOrder]
      summary: 从订单列表发起支付
      requestBody: { $ref: '#/components/requestBodies/OrderPayLaterReq' }
      responses:
        '200': { $ref: '#/components/responses/OrderPayNowResp' }
  /customer/v1/order/cancel:
    post:
      tags: [CustomerOrder]
      summary: 取消订单
      requestBody: { $ref: '#/components/requestBodies/CancelOrderReq' }
      responses:
        '200': { $ref: '#/components/responses/EmptyResp' }
  /customer/v1/order/list:
    get:
      tags: [CustomerOrder]
      summary: 我的订单列表
      parameters:
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/limit'
        - $ref: '#/components/parameters/unlimited'
        - { name: order_id, in: query, schema: { type: integer, format: int64 }, description: 订单 ID }
        - { name: status, in: query, schema: { type: integer, format: int32 }, description: 订单状态 }
        - { name: status_list, in: query, schema: { type: string }, description: 订单状态列表，逗号分隔 }
        - { name: goods_name_kw, in: query, schema: { type: string }, description: 商品名称关键词 }
        - { name: create_start, in: query, schema: { type: integer, format: int64 }, description: 创建开始时间，毫秒时间戳 }
        - { name: create_end, in: query, schema: { type: integer, format: int64 }, description: 创建结束时间，毫秒时间戳 }
        - { name: payment_start, in: query, schema: { type: integer, format: int64 }, description: 支付开始时间，毫秒时间戳 }
        - { name: payment_end, in: query, schema: { type: integer, format: int64 }, description: 支付结束时间，毫秒时间戳 }
        - { name: refund_start, in: query, schema: { type: integer, format: int64 }, description: 退款开始时间，毫秒时间戳 }
        - { name: refund_end, in: query, schema: { type: integer, format: int64 }, description: 退款结束时间，毫秒时间戳 }
      responses:
        '200': { $ref: '#/components/responses/UserOrderListResp' }
  /customer/v1/order/info:
    get:
      tags: [CustomerOrder]
      summary: 订单详情
      description: router.go 中该路由写为 cstRoot.GET("v1/order/info", ...)，缺少前导 /；此处按业务期望整理为 /customer/v1/order/info，运行态需确认。
      parameters:
        - { name: order_id, in: query, required: true, schema: { type: integer, format: int64 }, description: 订单 ID }
      responses:
        '200': { $ref: '#/components/responses/OrderInfoResp' }
components:
  securitySchemes:
    TokenAuth:
      type: apiKey
      in: header
      name: token
      description: 登录 token。白名单接口无需传入。
  parameters:
    page: { name: page, in: query, schema: { type: integer, default: 1 }, description: 页码 }
    limit: { name: limit, in: query, schema: { type: integer, default: 10, maximum: 1000 }, description: 每页条数 }
    unlimited: { name: unlimited, in: query, schema: { type: boolean, default: false }, description: 是否不限制分页上限 }
    once: { name: once, in: query, schema: { type: string }, description: 一次性随机串 }
    ts: { name: ts, in: query, schema: { type: integer, format: int64 }, description: 时间戳 }
    sign: { name: sign, in: query, schema: { type: string }, description: 签名，sha256(once + 固定秘钥 + ts) 小写 }
  requestBodies:
    CheckCaptchaReq: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/CheckCaptchaReq' } } } }
    GetSmsVerifyCodeReq: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/GetSmsVerifyCodeReq' } } } }
    AppletLoginReq: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/AppletLoginReq' } } } }
    MobilePasswordLoginReq: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/MobilePasswordLoginReq' } } } }
    MobileVerifyCodeLoginReq: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/MobileVerifyCodeLoginReq' } } } }
    MobilePasswordResetReq: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/MobilePasswordResetReq' } } } }
    WechatQrCodeReq: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/WechatQrCodeReq' } } } }
    WechatScanConfirmReq: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/WechatScanConfirmReq' } } } }
    ChangePasswordReq: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/ChangePasswordReq' } } } }
    ChangePasswordSmsCodeReq: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/ChangePasswordSmsCodeReq' } } } }
    LessonLearnReportReq: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/LessonLearnReportReq' } } } }
    AddGoodsReq: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/AddGoodsReq' } } } }
    RemoveGoodsReq: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/RemoveGoodsReq' } } } }
    OrderCalcFeeReq: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/OrderCalcFeeReq' } } } }
    OrderPayNowReq: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/OrderPayNowReq' } } } }
    OrderPayLaterReq: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/OrderPayLaterReq' } } } }
    CancelOrderReq: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/CancelOrderReq' } } } }
  responses:
    EmptyResp: { description: 统一空响应, content: { application/json: { schema: { allOf: [ { $ref: '#/components/schemas/Resp' }, { type: object, properties: { data: { nullable: true, description: 空数据 } } } ] } } } }
    IdResp: { description: 返回 ID, content: { application/json: { schema: { allOf: [ { $ref: '#/components/schemas/Resp' }, { type: object, properties: { data: { $ref: '#/components/schemas/IdData' } } } ] } } } }
    GetVerifyCaptchaResp: { description: 滑块验证码响应, content: { application/json: { schema: { allOf: [ { $ref: '#/components/schemas/Resp' }, { type: object, properties: { data: { $ref: '#/components/schemas/GetVerifyCaptchaRespData' } } } ] } } } }
    CheckCaptchaResp: { description: 滑块校验响应, content: { application/json: { schema: { allOf: [ { $ref: '#/components/schemas/Resp' }, { type: object, properties: { data: { $ref: '#/components/schemas/CheckCaptchaDtoResp' } } } ] } } } }
    SmsVerifyCodeResp: { description: 短信验证码响应, content: { application/json: { schema: { allOf: [ { $ref: '#/components/schemas/Resp' }, { type: object, properties: { data: { $ref: '#/components/schemas/SmsVerifyCodeRespData' } } } ] } } } }
    LoginResp: { description: 登录响应, content: { application/json: { schema: { allOf: [ { $ref: '#/components/schemas/Resp' }, { type: object, properties: { data: { $ref: '#/components/schemas/LoginRespData' } } } ] } } } }
    WechatQrCodeResp: { description: 微信二维码响应, content: { application/json: { schema: { allOf: [ { $ref: '#/components/schemas/Resp' }, { type: object, properties: { data: { $ref: '#/components/schemas/WechatQrCodeRespData' } } } ] } } } }
    WechatQrCodeStatusResp: { description: 微信扫码状态响应, content: { application/json: { schema: { allOf: [ { $ref: '#/components/schemas/Resp' }, { type: object, properties: { data: { $ref: '#/components/schemas/WechatQrCodeStatusRespData' } } } ] } } } }
    UserInfoResp: { description: 用户信息响应, content: { application/json: { schema: { allOf: [ { $ref: '#/components/schemas/Resp' }, { type: object, properties: { data: { $ref: '#/components/schemas/UserInfoDto' } } } ] } } } }
    ChangePasswordResp: { description: 修改密码响应, content: { application/json: { schema: { allOf: [ { $ref: '#/components/schemas/Resp' }, { type: object, properties: { data: { $ref: '#/components/schemas/ChangePasswordRespData' } } } ] } } } }
    CourseListResp: { description: 课程列表响应, content: { application/json: { schema: { allOf: [ { $ref: '#/components/schemas/Resp' }, { type: object, properties: { data: { $ref: '#/components/schemas/CourseListRespData' } } } ] } } } }
    CourseDetailResp: { description: 课程详情响应, content: { application/json: { schema: { allOf: [ { $ref: '#/components/schemas/Resp' }, { type: object, properties: { data: { $ref: '#/components/schemas/CourseDetailDto' } } } ] } } } }
    LessonResp: { description: 课时详情响应, content: { application/json: { schema: { allOf: [ { $ref: '#/components/schemas/Resp' }, { type: object, properties: { data: { $ref: '#/components/schemas/LessonDto' } } } ] } } } }
    LessonLearnInfoResp: { description: 学习进度响应, content: { application/json: { schema: { allOf: [ { $ref: '#/components/schemas/Resp' }, { type: object, properties: { data: { $ref: '#/components/schemas/LessonLearnInfoRespData' } } } ] } } } }
    PurchasedCourseListResp: { description: 已购买课程列表响应, content: { application/json: { schema: { allOf: [ { $ref: '#/components/schemas/Resp' }, { type: object, properties: { data: { $ref: '#/components/schemas/PurchasedCourseListRespData' } } } ] } } } }
    ContinueLearnResp: { description: 继续学习列表响应, content: { application/json: { schema: { allOf: [ { $ref: '#/components/schemas/Resp' }, { type: object, properties: { data: { $ref: '#/components/schemas/ContinueLearnRespData' } } } ] } } } }
    ListGoodsResp: { description: 购物车列表响应, content: { application/json: { schema: { allOf: [ { $ref: '#/components/schemas/Resp' }, { type: object, properties: { data: { $ref: '#/components/schemas/ListGoodsRespData' } } } ] } } } }
    OrderCalcFeeResp: { description: 计费响应, content: { application/json: { schema: { allOf: [ { $ref: '#/components/schemas/Resp' }, { type: object, properties: { data: { $ref: '#/components/schemas/OrderCalcFeeRespData' } } } ] } } } }
    OrderPayNowResp: { description: 支付参数响应, content: { application/json: { schema: { allOf: [ { $ref: '#/components/schemas/Resp' }, { type: object, properties: { data: { $ref: '#/components/schemas/OrderPayNowRespData' } } } ] } } } }
    UserOrderListResp: { description: 用户订单列表响应, content: { application/json: { schema: { allOf: [ { $ref: '#/components/schemas/Resp' }, { type: object, properties: { data: { $ref: '#/components/schemas/UserOrderListRespData' } } } ] } } } }
    OrderInfoResp: { description: 订单详情响应, content: { application/json: { schema: { allOf: [ { $ref: '#/components/schemas/Resp' }, { type: object, properties: { data: { $ref: '#/components/schemas/OrderInfoRespData' } } } ] } } } }
  schemas:
    Resp:
      type: object
      properties:
        code: { type: integer, description: 业务状态码 }
        msg: { type: string, description: 面向用户的状态消息 }
        err_msg: { type: string, description: 错误详情 }
        is_aes: { type: boolean, description: data 是否 AES 加密 }
        data: { nullable: true, description: 业务数据 }
    IdData:
      type: object
      properties:
        id: { type: integer, format: int64, description: 新增或关联记录 ID }
    Pager:
      type: object
      properties:
